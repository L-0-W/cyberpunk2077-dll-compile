name: Build Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Configure CMake
      run: |
        cmake -S . -B build `
          -G Ninja `
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cmake --build build   
