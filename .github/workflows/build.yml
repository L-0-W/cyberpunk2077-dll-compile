name: Build Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Configure CMake
      run: |
        cmake -S . -B build `
          -G Ninja `
          -DCMAKE_CXX_COMPILER="C:/Program Files/Microsoft Visual Studio/2022/Community/VC/Tools/MSVC/14.42.33830/bin/Hostx64/x64/cl.exe" `
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cmake --build build  

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnimalMod
        path: build/

 